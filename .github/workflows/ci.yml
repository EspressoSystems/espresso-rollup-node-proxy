name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: extractions/setup-just@v2

      - name: Build
        run: just build

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          args: ./... ./streamer/op/...

      - name: Test
        run: just test -v -race
